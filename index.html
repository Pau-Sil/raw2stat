<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>raw2stat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <div class="header-section">
            <h1>raw2stat</h1>
            <button id="themeToggleBtn" class="theme-btn">🌙 Oscuro</button>
        </div>
        
        <div class="type-selection">
            <h3>Tipo de Variable:</h3>
            <div class="segmented-control">
                <input type="radio" id="varQual" name="varType" value="cualitativa" checked>
                <label for="varQual">Cualitativa</label>
                
                <input type="radio" id="varDisc" name="varType" value="discreta">
                <label for="varDisc">Discreta</label>
                
                <input type="radio" id="varCont" name="varType" value="continua">
                <label for="varCont">Continua</label>
            </div>
        </div>

        <hr>

        <div id="qualitativeMode">
            <div class="tabs">
                <button class="tab-btn active" data-target="qualManualTab">Ingreso Manual</button>
                <button class="tab-btn" data-target="qualArrayTab">Ingreso por Arreglo</button>
            </div>

            <div id="qualManualTab" class="tab-content active method-card">
                <div class="input-group">
                    <input type="text" id="qualManualInput" placeholder="Escriba aquí (define nueva variable)" aria-label="Definir nueva variable cualitativa">
                    <button id="addQualCatBtn">Agregar</button>
                </div>
                
                <div id="qualFrequenciesSection" style="display: none; margin-top: 15px;">
                    <p class="help-text">Ingresá las repeticiones (f<sub>a</sub>) para cada variable:</p>
                    <div id="qualCatList" class="cat-grid"></div>
                    <button id="generateQualManualBtn" class="primary-btn">Generar Tabla Manual</button>
                </div>
            </div>

            <div id="qualArrayTab" class="tab-content method-card" style="display: none;">
                <div class="input-group">
                    <input type="text" id="qualArrayInput" placeholder="Escriba aquí (separados por espacio)" aria-label="Ingreso de variables cualitativas por arreglo">
                    <button id="processQualArrayBtn">Cargar y Generar</button>
                </div>
            </div>
        </div>

        <div id="quantitativeMode" style="display: none;">
            <div class="tabs">
                <button class="tab-btn active" data-target="quantManualTab">Ingreso Manual</button>
                <button class="tab-btn" data-target="quantArrayTab">Ingreso por Arreglo</button>
            </div>

            <div id="quantManualTab" class="tab-content active method-card">
                <div class="input-group">
                    <input type="number" id="quantSingleInput" step="any" placeholder="Escriba aquí" aria-label="Ingresar valor numérico individual">
                    <button id="addQuantSingleBtn">Agregar al Arreglo</button>
                </div>
            </div>

            <div id="quantArrayTab" class="tab-content method-card" style="display: none;">
                <div class="input-group">
                    <input type="text" id="quantArrayInput" placeholder="Escriba aquí (separados por espacio)" aria-label="Ingreso de valores cuantitativos por arreglo">
                    <button id="addQuantArrayBtn">Sumar Arreglo</button>
                </div>
            </div>

            <div class="data-section" id="quantDataSection" style="display: none; margin-top: 20px;">
                <p><strong>Arreglo Ordenado (n=<span id="quantCount">0</span>):</strong></p>
                <div id="quantResultBox" class="data-box result-box">-</div>
                <button id="clearQuantBtn" class="danger-btn">Limpiar Datos</button>
                
                <div class="table-config-section" id="continuousConfig" style="display: none;">
                    <hr>
                    <h3>Configuración de Clases</h3>
                    <div class="config-grid">
                        <div>
                            <label for="classCount">N Clases:</label>
                            <input type="number" id="classCount" min="1">
                        </div>
                        <div>
                            <label for="minValue">Mínimo:</label>
                            <input type="number" id="minValue" step="any">
                        </div>
                        <div>
                            <label for="maxValue">Máximo:</label>
                            <input type="number" id="maxValue" step="any">
                        </div>
                    </div>
                </div>

                <button id="generateQuantTableBtn" class="primary-btn">Generar Tabla Estadística</button>
            </div>
        </div>

        <div class="table-container" id="tableContainer" style="display: none;">
            <table id="freqTable">
                <thead>
                    <tr id="tableHeadRow"></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
